name: Daily Contribution

on:
  schedule:
    - cron: '0 9 * * *'    # Runs every day at 12:00 UTC (adjust if needed)
  workflow_dispatch:        # Allows manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make daily change
        run: |
          echo "Daily auto commit - $(date -u)" >> README.md
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-update.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add README.md last-update.txt
          git commit -m "Daily contribution - $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
