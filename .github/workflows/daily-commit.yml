name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Make daily change
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-update.txt
          echo "🌱 Daily contribution - $(date -u +'%A, %B %d %Y')" >> README.md

      - name: Show current status
        run: |
          git status
          git branch --show-current

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add last-update.txt README.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily contribution - $(date -u +'%Y-%m-%d')"
            echo "Pushing with PAT..."
            git push
          fi