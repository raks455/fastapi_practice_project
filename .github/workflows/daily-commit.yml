name: Daily Contribution

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          ref: main

      - name: Make daily change
        run: |
          echo "Last updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" > last-update.txt
          echo "🌱 Daily contribution - $(date -u +'%A, %B %d %Y')" >> README.md

      - name: Commit and Push with PAT
        run: |
          git config user.name "raks455"
          git config user.email "raks455@users.noreply.github.com"
          
          git add last-update.txt README.md
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily contribution - $(date -u +'%Y-%m-%d')"
            
            # Force push using PAT
            git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/raks455/fastapi_practice_project.git
            git push origin main
          fi